<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#faf8ef,#e6dccc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background:rgba(187,173,160,0.9);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

h2{color:white; margin-bottom:15px}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#8f7a66;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #6e5c4a;
}

/* LINK */
.link{color:white;font-size:14px;margin-top:10px}
.link span{color:#2196f3;cursor:pointer}

#msg{color:white;font-size:13px;margin-top:10px}
</style>
</head>

<body>

<div class="card">

<!-- LOGIN -->
<div id="loginBox">
<h2>Masuk</h2>
<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<div class="link">
Belum punya akun? <span onclick="showRegister()">Daftar</span>
</div>
</div>

<!-- REGISTER -->
<div id="registerBox" style="display:none;">
<h2>Daftar</h2>
<input id="regName" placeholder="Nama">
<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<div class="link">
Sudah punya akun? <span onclick="showLogin()">Masuk</span>
</div>
</div>

<p id="msg"></p>

</div>

<!-- 🔥 FIREBASE FIX -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbyU7IggUIsMrKvxhU-mTtv-VsEOoB5iw",
  authDomain: "project-4785033342589185071.firebaseapp.com",
  databaseURL: "https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-4785033342589185071",
  storageBucket: "project-4785033342589185071.firebasestorage.app",
  messagingSenderId: "933405535534",
  appId: "1:933405535534:web:2979b14d5a070205e31ebf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// SWITCH UI
window.showRegister=()=>{
  loginBox.style.display="none";
  registerBox.style.display="block";
}

window.showLogin=()=>{
  registerBox.style.display="none";
  loginBox.style.display="block";
}

// ✅ REGISTER (FIX TOTAL)
window.register = async ()=>{
  const name = regName.value.trim();
  const email = regEmail.value.trim();
  const pass = regPass.value.trim();

  if(!name){
    msg.innerText="Nama wajib!";
    return;
  }

  try{
    const u = await createUserWithEmailAndPassword(auth,email,pass);

    // 🔥 WAJIB: tunggu sampai data ke-save
    await set(ref(db,"users/"+u.user.uid),{
      name: name,
      email: email,
      score: 0
    });

    msg.innerText="Berhasil daftar!";
    
    // 🔥 redirect setelah aman
    location.href = "main.html";

  }catch(e){
    msg.innerText = e.message;
    console.log(e);
  }
}

// LOGIN
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,loginEmail.value.trim(),loginPass.value.trim());
    location.href="main.html";
  }catch(e){
    msg.innerText=e.message;
  }
}
</script>

</body>
</html>
