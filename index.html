<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  overflow:hidden;

  background: linear-gradient(135deg,#faf8ef,#e6dccc);

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🔥 GLOW */
body::before, body::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.6;
}

body::before{
  width:300px;
  height:300px;
  background:#edc22e;
  top:10%;
  left:10%;
  animation:float 6s infinite ease-in-out;
}

body::after{
  width:250px;
  height:250px;
  background:#f59563;
  bottom:10%;
  right:10%;
  animation:float 8s infinite ease-in-out;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-30px);}
}

/* 🎮 TILE BACKGROUND */
.tile-bg{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:10px;
  background:#eee4da;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  opacity:0.15;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-100px);}
  to{transform:translateY(110vh);}
}

/* ✨ PARTICLES */
.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  opacity:0.3;
  animation:particleMove linear infinite;
}

@keyframes particleMove{
  from{transform:translateY(0);}
  to{transform:translateY(-100vh);}
}

/* 🧊 CARD GLASS */
.card{
  position:relative;
  background:rgba(187,173,160,0.7);
  backdrop-filter: blur(10px);
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
  animation:fadeIn .6s ease;
  z-index:10;
}

h2{color:white}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

input:focus{
  box-shadow:0 0 0 3px rgba(255,255,255,0.3);
}

/* 🔥 BUTTON 3D */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#8f7a66;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}

button:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #6e5c4a;
}

/* LINK */
.link{color:white; font-size:14px;}
.link span{color:#2196f3; cursor:pointer;}

#msg{color:white; font-size:13px;}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<!-- 🎮 TILE BACKGROUND AUTO -->
<script>
for(let i=0;i<10;i++){
  let t=document.createElement("div");
  t.className="tile-bg";
  t.innerText=[2,4,8,16][Math.floor(Math.random()*4)];
  t.style.left=Math.random()*100+"vw";
  t.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(t);
}

/* ✨ PARTICLES */
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.top=Math.random()*100+"vh";
  p.style.animationDuration=(5+Math.random()*10)+"s";
  document.body.appendChild(p);
}
</script>

<div class="card">

<div id="loginBox">
<h2>Masuk</h2>
<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>

<div class="link">
Belum punya akun? <span onclick="showRegister()">Daftar</span>
</div>
</div>

<div id="registerBox" style="display:none;">
<h2>Daftar</h2>
<input id="regName" placeholder="Nama">
<input id="regEmail" type="email" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>

<div class="link">
Sudah punya akun? <span onclick="showLogin()">Masuk</span>
</div>
</div>

<p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbyU7IggUIsMrKvxhU-mTtv-VsEOoB5iw",
  authDomain: "project-4785033342589185071.firebaseapp.com",
  databaseURL: "https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-4785033342589185071",
  storageBucket: "project-4785033342589185071.firebasestorage.app",
  messagingSenderId: "933405535534",
  appId: "1:933405535534:web:2979b14d5a070205e31ebf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.showRegister=()=>{
  loginBox.style.display="none";
  registerBox.style.display="block";
}

window.showLogin=()=>{
  registerBox.style.display="none";
  loginBox.style.display="block";
}

window.register=async()=>{
  const name=regName.value.trim();
  const email=regEmail.value.trim();
  const pass=regPass.value.trim();

  if(!name){msg.innerText="Nama wajib!"; return;}

  try{
    const u=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,"users/"+u.user.uid),{
      name,email,score:0
    });
    msg.innerText="Berhasil daftar!";
  }catch(e){msg.innerText=e.message;}
}

window.login=async()=>{
  try{
    await signInWithEmailAndPassword(auth,loginEmail.value.trim(),loginPass.value.trim());
    location.href="main.html";
  }catch(e){msg.innerText=e.message;}
}

onAuthStateChanged(auth,u=>{
  if(u) location.href="main.html";
});
</script>

</body>
</html>
