<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login 2048</title>

<style>
body{
  font-family: Arial;
  background:#121212;
  color:white;
  text-align:center;
  padding-top:100px;
}

input{
  padding:10px;
  margin:5px;
  width:250px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#00a844;
}
</style>
</head>
<body>

<h2>Login / Register 2048</h2>

<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// CONFIG LU
const firebaseConfig = {
  apiKey: "AIzaSyAbyU7IggUIsMrKvxhU-mTtv-VsEOoB5iw",
  authDomain: "project-4785033342589185071.firebaseapp.com",
  databaseURL: "https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-4785033342589185071",
  storageBucket: "project-4785033342589185071.firebasestorage.app",
  messagingSenderId: "933405535534",
  appId: "1:933405535534:web:2979b14d5a070205e31ebf",
  measurementId: "G-JM5PB1VPKH"
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// REGISTER
window.register = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  createUserWithEmailAndPassword(auth, email, pass)
  .then(async (userCred) => {
    const user = userCred.user;

    // 🔥 WAJIB: simpan ke database
    await set(ref(db, "users/" + user.uid), {
      email: email,
      score: 0
    });

    document.getElementById("msg").innerText = "Register sukses!";
  })
  .catch(err => {
    document.getElementById("msg").innerText = err.message;
  });
  }

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth, email, pass)
  .then(() => {
    window.location.href = "main.html";
  })
  .catch(err => {
    document.getElementById("msg").innerText = err.message;
  });
}

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if(user){
    window.location.href = "main.html";
  }
});
</script>

</body>
</html>
