<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login 2048</title>
</head>
<body>

<h2>Login / Register</h2>

<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBAw_4EbDeR-j_V8RCBvhkDtIuDH3fIZBc",
  authDomain: "game-45646.firebaseapp.com",
  projectId: "game-45646",
  storageBucket: "game-45646.firebasestorage.app",
  messagingSenderId: "488036675536",
  appId: "1:488036675536:web:5ecea3d39f145a78e693d5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const emailInput = document.getElementById("email");
const passInput = document.getElementById("pass");

// AUTO REDIRECT KALO UDAH LOGIN 🔥
onAuthStateChanged(auth, user => {
  if(user){
    location.href = "main.html";
  }
});

window.register = () => {
  createUserWithEmailAndPassword(auth, emailInput.value, passInput.value)
    .then(()=> alert("Register sukses!"))
    .catch(e=> alert(e.message));
};

window.login = () => {
  signInWithEmailAndPassword(auth, emailInput.value, passInput.value)
    .then(()=> location.href="main.html")
    .catch(e=> alert(e.message));
};
</script>

</body>
</html>
