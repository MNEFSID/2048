<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masuk</title>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#faf8ef;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CARD */
.card{
  background:#bbada0;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  animation:fadeIn .5s ease;
  transition:.3s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

h2{
  margin-bottom:20px;
  color:white;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  outline:none;
  transition:.2s;
}

input:focus{
  box-shadow:0 0 0 3px rgba(255,255,255,0.3);
  transform:scale(1.02);
}

/* 🔥 BUTTON 3D */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#8f7a66;
  color:white;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
  transition:.15s;
}

button:hover{
  transform:translateY(-1px);
}

button:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #6e5c4a;
}

/* LINK */
.link{
  margin-top:10px;
  font-size:14px;
  color:white;
}

.link span{
  color:#2196f3;
  cursor:pointer;
  transition:.2s;
}

.link span:hover{
  text-decoration:underline;
  opacity:0.8;
}

#msg{
  margin-top:10px;
  color:#fff;
  font-size:13px;
}

/* ANIMASI */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.fade{
  animation:fadeSwitch .3s ease;
}

@keyframes fadeSwitch{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="card">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Masuk</h2>
    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">

    <button onclick="login()">Masuk</button>

    <div class="link">
      Belum punya akun? <span onclick="showRegister()">Daftar</span>
    </div>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" style="display:none;">
    <h2>Daftar</h2>
    <input id="regName" placeholder="Nama">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">

    <button onclick="register()">Daftar</button>

    <div class="link">
      Sudah punya akun? <span onclick="showLogin()">Masuk</span>
    </div>
  </div>

  <p id="msg"></p>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbyU7IggUIsMrKvxhU-mTtv-VsEOoB5iw",
  authDomain: "project-4785033342589185071.firebaseapp.com",
  databaseURL: "https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-4785033342589185071",
  storageBucket: "project-4785033342589185071.firebasestorage.app",
  messagingSenderId: "933405535534",
  appId: "1:933405535534:web:2979b14d5a070205e31ebf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// SWITCH UI
window.showRegister = () => {
  document.getElementById("loginBox").style.display="none";
  const reg = document.getElementById("registerBox");
  reg.style.display="block";
  reg.classList.add("fade");
}

window.showLogin = () => {
  document.getElementById("registerBox").style.display="none";
  const log = document.getElementById("loginBox");
  log.style.display="block";
  log.classList.add("fade");
}

// REGISTER
window.register = async function(){
  const name = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pass = document.getElementById("regPass").value.trim();

  if(!name){
    document.getElementById("msg").innerText = "Nama wajib diisi!";
    return;
  }

  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    const user = userCred.user;

    await set(ref(db, "users/" + user.uid), {
      name: name,
      email: email,
      score: 0
    });

    document.getElementById("msg").innerText = "Register berhasil!";
  }catch(err){
    document.getElementById("msg").innerText = err.message;
  }
}

// LOGIN
window.login = async function(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value.trim();

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    location.href = "main.html";
  }catch(err){
    document.getElementById("msg").innerText = err.message;
  }
}

// AUTO LOGIN
onAuthStateChanged(auth, user=>{
  if(user){
    location.href = "main.html";
  }
});
</script>

</body>
</html>
