<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Online</title>

<style>
body{
  background:#faf8ef;
  font-family:'Poppins';
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
}

h1{margin-top:15px}

/* SCORE */
#scoreBox{
  display:flex;
  gap:10px;
  margin:10px;
}

.box{
  background:#bbada0;
  color:white;
  padding:10px 15px;
  border-radius:10px;
}

/* GAME */
#game{
  width:320px;
  height:320px;
  background:#bbada0;
  position:relative;
  border-radius:10px;
}

.cell,.tile{
  position:absolute;
  width:calc((320px - 50px)/4);
  height:calc((320px - 50px)/4);
  border-radius:10px;
}

.cell{background:#cdc1b4;}

.tile{
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  transition:.15s;
}

/* ANIMASI */
.spawn{animation:pop .2s;}
.merge{animation:merge .2s;}

@keyframes pop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

@keyframes merge{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

/* WARNA TILE */
.tile[data-val="2"]{background:#eee4da;}
.tile[data-val="4"]{background:#ede0c8;}
.tile[data-val="8"]{background:#f2b179;color:#fff;}
.tile[data-val="16"]{background:#f59563;color:#fff;}
.tile[data-val="32"]{background:#f67c5f;color:#fff;}
.tile[data-val="64"]{background:#f65e3b;color:#fff;}
.tile[data-val="128"]{background:#edcf72;color:#fff;}
.tile[data-val="256"]{background:#edcc61;color:#fff;}
.tile[data-val="512"]{background:#edc850;color:#fff;}
.tile[data-val="1024"]{background:#edc53f;color:#fff;}
.tile[data-val="2048"]{background:#edc22e;color:#fff;}

/* CONTROL */
#controls{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}

.ctrl{
  height:60px;
  background:#8f7a66;
  color:white;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}
.ctrl:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #6e5c4a;
}

/* LEADERBOARD */
#leaderboard{
  margin-top:15px;
  background:#bbada0;
  padding:10px;
  border-radius:10px;
  color:white;
  width:300px;
}

/* LOGOUT */
.logout{
  margin:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#8f7a66;
  color:white;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}
.logout:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #6e5c4a;
}
</style>
</head>

<body>

<h1>2048</h1>

<div id="scoreBox">
  <div class="box">Score<br><span id="score">0</span></div>
  <div class="box">Best<br><span id="best">0</span></div>
</div>

<div id="game"></div>

<div id="controls">
  <div></div>
  <button class="ctrl" onclick="move('up')">↑</button>
  <div></div>

  <button class="ctrl" onclick="move('left')">←</button>
  <div></div>
  <button class="ctrl" onclick="move('right')">→</button>

  <div></div>
  <button class="ctrl" onclick="move('down')">↓</button>
  <div></div>
</div>

<div id="leaderboard">Loading...</div>

<button class="logout" onclick="logout()">Logout</button>

<script>
const game=document.getElementById("game");
const size=4, gap=10, gameSize=320;
const tileSize=(gameSize-gap*(size+1))/size;

let grid,score=0,best=0;

function pos(r,c){
  return{
    x:gap+c*(tileSize+gap),
    y:gap+r*(tileSize+gap)
  };
}

function init(){
  grid=Array(size).fill().map(()=>Array(size).fill(0));
  game.innerHTML="";
  score=0; updateScore();

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let d=document.createElement("div");
      d.className="cell";
      let p=pos(r,c);
      d.style.left=p.x+"px";
      d.style.top=p.y+"px";
      game.appendChild(d);
    }
  }

  spawn(); spawn();
}

function spawn(){
  let empty=[];
  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(!grid[r][c]) empty.push({r,c});

  if(!empty.length) return;

  let {r,c}=empty[Math.random()*empty.length|0];
  let val=Math.random()<0.9?2:4;
  grid[r][c]=val;

  createTile(r,c,val,true);
}

function createTile(r,c,val,spawnAnim=false){
  let t=document.createElement("div");
  t.className="tile";
  if(spawnAnim) t.classList.add("spawn");

  t.innerText=val;
  t.dataset.val=val;

  let p=pos(r,c);
  t.style.left=p.x+"px";
  t.style.top=p.y+"px";

  game.appendChild(t);
}

function updateScore(){
  scoreEl.innerText=score;

  if(score>best){
    best=score;
    bestEl.innerText=best;
    if(window.saveScoreOnline) window.saveScoreOnline(best);
  }
}

function slide(row){
  row=row.filter(v=>v);
  for(let i=0;i<row.length-1;i++){
    if(row[i]==row[i+1]){
      row[i]*=2;
      score+=row[i];
      row[i+1]=0;
    }
  }
  return row.filter(v=>v);
}

function move(dir){
  let moved=false;

  for(let i=0;i<size;i++){
    let row;

    if(dir=="left"){
      row=slide(grid[i]);
      while(row.length<size) row.push(0);
      if(grid[i].toString()!=row.toString()) moved=true;
      grid[i]=row;
    }

    if(dir=="right"){
      row=slide(grid[i].slice().reverse());
      while(row.length<size) row.push(0);
      row=row.reverse();
      if(grid[i].toString()!=row.toString()) moved=true;
      grid[i]=row;
    }

    if(dir=="up"){
      row=slide(grid.map(r=>r[i]));
      while(row.length<size) row.push(0);
      for(let j=0;j<size;j++){
        if(grid[j][i]!=row[j]) moved=true;
        grid[j][i]=row[j];
      }
    }

    if(dir=="down"){
      row=slide(grid.map(r=>r[i]).reverse());
      while(row.length<size) row.push(0);
      row=row.reverse();
      for(let j=0;j<size;j++){
        if(grid[j][i]!=row[j]) moved=true;
        grid[j][i]=row[j];
      }
    }
  }

  if(!moved) return;

  updateScore();
  redraw();
  spawn();
}

function redraw(){
  game.querySelectorAll(".tile").forEach(e=>e.remove());

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      if(grid[r][c]){
        createTile(r,c,grid[r][c]);
      }
    }
  }
}

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

init();
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSyAbyU7IggUIsMrKvxhU-mTtv-VsEOoB5iw",
  authDomain:"project-4785033342589185071.firebaseapp.com",
  databaseURL:"https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const auth=getAuth(app);
const db=getDatabase(app);

let user;

onAuthStateChanged(auth, async(u)=>{
  if(!u){
    setTimeout(()=>{
      if(!auth.currentUser) location.href="index.html";
    },500);
    return;
  }

  user=u;

  const snap=await get(ref(db,"users/"+u.uid));
  if(snap.exists()){
    best=snap.val().score||0;
    bestEl.innerText=best;
  }

  loadLeaderboard();
});

window.saveScoreOnline=(score)=>{
  update(ref(db,"users/"+user.uid),{score});
};

window.logout=()=>signOut(auth).then(()=>location.href="index.html");

async function loadLeaderboard(){
  const snap=await get(ref(db,"users"));
  if(!snap.exists()) return;

  let data=Object.values(snap.val());
  data.sort((a,b)=>b.score-a.score);

  let html="<b>Leaderboard</b><br>";
  data.slice(0,5).forEach((d,i)=>{
    html+=`${i+1}. ${d.name} - ${d.score}<br>`;
  });

  leaderboard.innerHTML=html;
}
</script>

</body>
</html>
