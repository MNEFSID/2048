<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Online</title>

<style>
body{
  background:#faf8ef;
  font-family:'Poppins';
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
}

h1{margin-top:15px}

/* SCORE */
#scoreBox{
  display:flex;
  gap:10px;
  margin:10px;
}

.box{
  background:#bbada0;
  color:white;
  padding:10px 15px;
  border-radius:10px;
}

/* GAME */
#game{
  width:320px;
  height:320px;
  background:#bbada0;
  position:relative;
  border-radius:10px;
}

.cell,.tile{
  position:absolute;
  width:calc((320px - 50px)/4);
  height:calc((320px - 50px)/4);
  border-radius:10px;
}

.cell{background:#cdc1b4;}

.tile{
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* TILE WARNA */
.tile[data-val="2"]{background:#eee4da;}
.tile[data-val="4"]{background:#ede0c8;}
.tile[data-val="8"]{background:#f2b179;color:#fff;}
.tile[data-val="16"]{background:#f59563;color:#fff;}
.tile[data-val="32"]{background:#f67c5f;color:#fff;}
.tile[data-val="64"]{background:#f65e3b;color:#fff;}

/* CONTROL */
#controls{
  margin-top:15px;
  display:grid;
  grid-template-columns:repeat(3,70px);
  gap:10px;
}

.ctrl{
  height:60px;
  background:#8f7a66;
  color:white;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}

.ctrl:active{
  transform:translateY(4px);
  box-shadow:0 2px 0 #6e5c4a;
}

/* LEADERBOARD */
#leaderboard{
  margin-top:15px;
  background:#bbada0;
  padding:10px;
  border-radius:10px;
  color:white;
  width:300px;
}

/* LOGOUT */
.logout{
  margin:15px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#8f7a66;
  color:white;
  cursor:pointer;
  box-shadow:0 5px 0 #6e5c4a;
}
.logout:active{
  transform:translateY(3px);
  box-shadow:0 2px 0 #6e5c4a;
}
</style>
</head>

<body>

<h1>2048</h1>

<div id="scoreBox">
  <div class="box">Score<br><span id="score">0</span></div>
  <div class="box">Best<br><span id="best">0</span></div>
</div>

<div id="game"></div>

<!-- CONTROL CROSS -->
<div id="controls">
  <div></div>
  <button class="ctrl" onclick="move('up')">↑</button>
  <div></div>

  <button class="ctrl" onclick="move('left')">←</button>
  <div></div>
  <button class="ctrl" onclick="move('right')">→</button>

  <div></div>
  <button class="ctrl" onclick="move('down')">↓</button>
  <div></div>
</div>

<div id="leaderboard">Loading...</div>

<button class="logout" onclick="logout()">Logout</button>

<!-- GAME LOGIC (GAK DIUBAH) -->
<script>
const game=document.getElementById("game");
const size=4, gameSize=320, gap=10;
const tileSize=(gameSize-gap*(size+1))/size;

let grid,tiles={},score=0;
let best=0; // 🔥 dari firebase

function pos(r,c){
  return{
    x:gap+c*(tileSize+gap),
    y:gap+r*(tileSize+gap)
  };
}

function init(){
  grid=Array(size).fill().map(()=>Array(size).fill(0));
  game.innerHTML="";
  tiles={}; score=0; updateScore();

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      let d=document.createElement("div");
      d.className="cell";
      let p=pos(r,c);
      d.style.left=p.x+"px";
      d.style.top=p.y+"px";
      game.appendChild(d);
    }
  }

  spawn(); spawn();
}

function spawn(){
  let empty=[];
  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(!grid[r][c]) empty.push({r,c});

  if(!empty.length) return;

  let {r,c}=empty[Math.random()*empty.length|0];
  let val=Math.random()<0.9?2:4;
  grid[r][c]=val;

  createTile(r,c,val);
}

function createTile(r,c,val){
  let t=document.createElement("div");
  t.className="tile";
  t.innerText=val;
  t.dataset.val=val;

  let p=pos(r,c);
  t.style.left=p.x+"px";
  t.style.top=p.y+"px";

  game.appendChild(t);
  tiles[r+"-"+c]=t;
}

function updateScore(){
  scoreEl.innerText=score;

  if(score>best){
    best=score;
    bestEl.innerText=best;

    if(window.saveScoreOnline){
      window.saveScoreOnline(best);
    }
  }
}

function move(dir){
  let moved=false;
  let newGrid=Array(size).fill().map(()=>Array(size).fill(0));

  for(let r=0;r<size;r++){
    for(let c=0;c<size;c++){
      if(!grid[r][c]) continue;
      let nr=r,nc=c,val=grid[r][c];

      if(dir=="left") nc=0;
      if(dir=="right") nc=3;
      if(dir=="up") nr=0;
      if(dir=="down") nr=3;

      if(newGrid[nr][nc]==0){
        newGrid[nr][nc]=val;
        moved=true;
      }
    }
  }

  if(!moved) return;
  grid=newGrid;
  updateScore();

  game.querySelectorAll(".tile").forEach(e=>e.remove());
  tiles={};

  for(let r=0;r<size;r++)
    for(let c=0;c<size;c++)
      if(grid[r][c]) createTile(r,c,grid[r][c]);

  spawn();
}

const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

init();
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, get, update } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app=initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"project-4785033342589185071.firebaseapp.com",
  databaseURL:"https://project-4785033342589185071-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const auth=getAuth(app);
const db=getDatabase(app);

let user;

onAuthStateChanged(auth, async(u)=>{
  if(!u) location.href="index.html";

  user=u;

  const snap=await get(ref(db,"users/"+u.uid));
  if(snap.exists()){
    best = snap.val().score || 0;
    bestEl.innerText = best;
  }

  loadLeaderboard();
});

window.saveScoreOnline=(score)=>{
  update(ref(db,"users/"+user.uid),{score});
};

window.logout=()=>signOut(auth).then(()=>location.href="index.html");

async function loadLeaderboard(){
  const snap=await get(ref(db,"users"));
  let data=Object.values(snap.val());

  data.sort((a,b)=>b.score-a.score);

  let html="<b>Leaderboard</b><br>";
  data.slice(0,5).forEach((d,i)=>{
    html+=`${i+1}. ${d.name} - ${d.score}<br>`;
  });

  leaderboard.innerHTML=html;
}
</script>

</body>
</html>
