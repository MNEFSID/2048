<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">

<style>
body{
  background:#faf8ef;
  font-family:'Poppins';
  display:flex;
  flex-direction:column;
  align-items:center;
}

#leaderboard{
  margin-top:10px;
  font-size:14px;
}

#game{
  width:320px;
  height:320px;
  background:#bbada0;
  position:relative;
  border-radius:10px;
}
</style>
</head>
<body>

<h2 id="player">Loading...</h2>
<div id="game"></div>
<h3>Score: <span id="score">0</span></h3>
<div id="leaderboard"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1SxlN2devIAFSO-_iB7QEKlOtCGC9e1E",
  authDomain: "project-6710900057226316014.firebaseapp.com",
  projectId: "project-6710900057226316014",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid;

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="index.html";

  uid = user.uid;

  let snap = await getDoc(doc(db,"users",uid));
  document.getElementById("player").innerText = "Player: "+snap.data().name;

  loadLeaderboard();
});

async function saveScore(score){
  if(!uid) return;

  let ref = doc(db,"users",uid);
  let snap = await getDoc(ref);

  if(score > (snap.data().score||0)){
    await updateDoc(ref,{score});
    loadLeaderboard();
  }
}

async function loadLeaderboard(){
  let snap = await getDocs(collection(db,"users"));

  let data=[];
  snap.forEach(d=>data.push(d.data()));

  data.sort((a,b)=>b.score-a.score);

  let html="<b>Leaderboard</b><br>";
  data.slice(0,10).forEach((d,i)=>{
    html+=`${i+1}. ${d.name} - ${d.score}<br>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

/* TEST SCORE */
let score=0;
setInterval(()=>{
  score+=10;
  document.getElementById("score").innerText=score;
  saveScore(score);
},2000);
</script>

</body>
</html>
